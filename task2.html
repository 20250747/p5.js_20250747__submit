<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 2 - 변수 활용 정적 캐릭터 명세</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  
  <style>
    body {
      background-color: #0b0f19;
      color: #ffffff;
      font-family: sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .header-area {
      text-align: center;
      margin-bottom: 30px;
      max-width: 600px;
    }

    .back-link {
      color: #3b82f6;
      text-decoration: none;
      font-size: 0.95rem;
      display: inline-block;
      margin-bottom: 15px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #60a5fa;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 2rem;
    }

    p {
      color: #9ca3af;
      margin: 0;
    }

    canvas {
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="header-area">
    <a href="index.html" class="back-link">← 메인 페이지로 돌아가기</a>
    <h1>과제 2: 변수 활용 정적 캐릭터 명세</h1>
    <p>좌표 변수와 Bezier 곡선을 정밀하게 매칭하여 렌더링한 정적 캐릭터 디자인입니다.</p>
  </div>

  <script>
    function setup() {
      createCanvas(600, 400);
    }

    function draw() {
      background('#99CC99');
      
      // 뒷 머리카락
      noStroke();
      fill('#323232');
      ellipse(300, 220, 215, 330); 

      // 얼굴
      fill('#FAEBD7');
      noStroke();
      circle(240, 175, 55);
      circle(360, 175, 55);
      quad(276, 227, 325, 227, 329, 290, 272, 290);
      ellipse(300, 170, 140, 160);

      // 앞머리
      fill('#323232');
      stroke('#323232');
      strokeWeight(1);
      bezier(300, 90, 290, 120, 220, 155, 220, 155);
      bezier(300, 90, 235, 89, 220, 155, 220, 155);
      bezier(300, 90, 365, 89, 380, 155, 380, 155);
      bezier(300, 90, 310, 120, 380, 155, 380, 155);

      // 옷
      fill('#FFB6C1');
      noStroke();
      quad(245, 290, 355, 290, 435, 400, 160, 400);
      bezier(245, 290, 190, 300, 175, 350, 160, 400);
      bezier(355, 290, 410, 300, 425, 350, 435, 400);

      // 목과 옷 연결 부위
      fill('#FAEBD7');
      arc(300, 290, 95, 60, 0, PI);

      // 쇄골
      noFill();
      stroke('#FFD5A6');
      strokeWeight(2.3);
      bezier(288, 305, 280, 300, 280, 300, 258, 300);
      bezier(312, 305, 320, 300, 320, 300, 342, 300);

      // 목걸이 줄 및 펜던트
      noFill();
      stroke('#FFE650');
      strokeWeight(2);
      bezier(329, 290, 300.5, 340, 300.5, 340, 272, 290);
      noStroke();
      fill(255); 
      circle(300.5, 328, 20);

      // 눈
      fill(0);
      ellipse(270, 170, 13, 15);
      ellipse(330, 170, 13, 15);
      noFill();
      stroke(0);
      strokeWeight(1);
      bezier(278, 165, 268, 158, 260, 167, 255, 165);
      bezier(322, 165, 332, 158, 340, 167, 345, 165);
      fill(255);
      noStroke();
      circle(267, 168, 5);
      circle(327, 168, 5);

      // 코
      noFill();
      stroke('#F0CB85');
      strokeWeight(3);
      bezier(295, 195, 300, 190, 300, 190, 305, 195);

      // 입
      stroke('#CC6666');
      strokeWeight(2);
      bezier(277, 215, 300, 223, 300, 223, 323, 215);

      // 귀
      stroke('#E6C17B');
      strokeWeight(2);
      bezier(225, 165, 220, 160, 215, 180, 230, 190);
      bezier(375, 165, 380, 160, 385, 180, 370, 190);

      // 턱
      stroke('#FFD5A6');
      strokeWeight(2);
      bezier(279, 245, 300, 250, 300, 250, 321, 245);

      // 옆얼굴 선
      bezier(230, 153, 231, 175, 233, 185, 236, 201);
      bezier(370, 153, 369, 175, 367, 185, 364, 201);

      // 눈썹
      stroke('#787878');
      strokeWeight(1.5);
      bezier(282, 145, 270, 142, 255, 144, 245, 148);
      bezier(318, 145, 330, 142, 345, 144, 355, 148);
    }
  </script>

</body>
</html>
}

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 4 - 루프 애니메이션</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  
  <style>
    body {
      background-color: #0b0f19;
      color: #ffffff;
      font-family: sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .header-area {
      text-align: center;
      margin-bottom: 30px;
      max-width: 600px;
    }

    .back-link {
      color: #3b82f6;
      text-decoration: none;
      font-size: 0.95rem;
      display: inline-block;
      margin-bottom: 15px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #60a5fa;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 2rem;
    }

    p {
      color: #9ca3af;
      margin: 0 0 15px 0;
      line-height: 1.6;
    }

    .guide-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 20px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 0.9rem;
      color: #3b82f6;
    }

    canvas {
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="header-area">
    <a href="index.html" class="back-link">← 메인 페이지로 돌아가기</a>
    <h1>과제 4: 색상 및 크기 변화 애니메이션</h1>
    <p>시간의 흐름과 프레임 카운트를 수학적 주기 함수로 계산하여 자연스러운 움직임과 무지개 색상 동적 변화를 구현한 최종 작업물입니다.</p>
    <div class="guide-box">
      <strong>🎮 조작 방법:</strong> 키보드 <code>S</code> 누르기 (10초짜리 GIF 파일 저장)
    </div>
  </div>

  <script>
    function setup() {
      createCanvas(600, 400);
    }

    function draw() {
      background('#99CC99');
      
      // 뒷 머리카락 연산 및 회전 루프
      let timeInSeconds = millis() / 1000.0;
      let wave = cos(frameCount * 0.04);
      let swingAngle = sin(wave) * 0.04;  
        
      push(); 
        translate(300, 55); 
        rotate(swingAngle);
        noStroke();
        fill('#323232');
        ellipse(0, 165, 215, 330); 
      pop();

      // 얼굴
      fill('#FAEBD7');
      noStroke();
      circle(240, 175, 55);
      circle(360, 175, 55);
      quad(276, 227, 325, 227, 329, 290, 272, 290);
      ellipse(300, 170, 140, 160);

      // 앞머리
      fill('#323232');
      stroke('#323232');
      strokeWeight(1);
      bezier(300, 90, 290, 120, 220, 155, 220, 155);
      bezier(300, 90, 235, 89, 220, 155, 220, 155);
      bezier(300, 90, 365, 89, 380, 155, 380, 155);
      bezier(300, 90, 310, 120, 380, 155, 380, 155);

      // 옷 (무지개 훌라 효과 색상 연산 구역 복구 완료)
      push(); 
        colorMode(HSB, 360, 100, 100);
        let rainbowHue = (frameCount * 0.5) % 360;
        fill(rainbowHue, 80, 90);
        noStroke();
        
        quad(245, 290, 355, 290, 435, 400, 160, 400);
        bezier(245, 290, 190, 300, 175, 350, 160, 400);
        bezier(355, 290, 410, 300, 425, 350, 435, 400);
      pop();

      // 목과 옷 연결 부위
      noStroke();
      fill('#FAEBD7');
      arc(300, 290, 95, 60, 0, PI);

      // 쇄골
      noFill();
      stroke('#FFD5A6');
      strokeWeight(2.3);
      bezier(288, 305, 280, 300, 280, 300, 258, 300);
      bezier(312, 305, 320, 300, 320, 300, 342, 300);

      // 목걸이 줄
      noFill();
      stroke('#FFE650');
      strokeWeight(2);
      bezier(329, 290, 300.5, 340, 300.5, 340, 272, 290);
      
      // 목걸이 펜던트 팽창 애니메이션
      noStroke();
      fill(255); // 300 오버플로우 수정 (최대 흰색 값 255)
      let angle = frameCount * 0.05;
      let diameter = 20 + sin(angle) * 15;
      circle(300.5, 328, diameter);

      // 눈 형태 및 동공 하이라이트
      fill(0);
      ellipse(270, 170, 13, 15);
      ellipse(330, 170, 13, 15);
      noFill();
      stroke(0);
      strokeWeight(1);
      bezier(278, 165, 268, 158, 260, 167, 255, 165);
      bezier(322, 165, 332, 158, 340, 167, 345, 165);
      fill(255); 
      noStroke();
      circle(267, 168, 5);
      circle(327, 168, 5);

      // 코
      noFill();
      stroke('#F0CB85');
      strokeWeight(3);
      bezier(295, 195, 300, 190, 300, 190, 305, 195);

      // 입
      stroke('#CC6666');
      strokeWeight(2);
      bezier(277, 215, 300, 223, 300, 223, 323, 215);

      // 귀
      stroke('#E6C17B');
      strokeWeight(2);
      bezier(225, 165, 220, 160, 215, 180, 230, 190);
      bezier(375, 165, 380, 160, 385, 180, 370, 190);

      // 턱
      stroke('#FFD5A6');
      strokeWeight(2);
      bezier(279, 245, 300, 250, 300, 250, 321, 245);

      // 옆얼굴 선
      bezier(230, 153, 231, 175, 233, 185, 236, 201);
      bezier(370, 153, 369, 175, 367, 185, 364, 201);

      // 눈썹
      stroke('#787878');
      strokeWeight(1.5);
      bezier(282, 145, 270, 142, 255, 144, 245, 148);
      bezier(318, 145, 330, 142, 345, 144, 355, 148);
    }

    function keyPressed() {
      if (key === 's' || key === 'S') {
        saveGif('mySketch', 10); 
      }
    }
  </script>

</body>
</html>
</html>
